kind = "web"
previewPath = "/"
title = "Krovenia RP"
version = "1.0.0"
id = "artifacts/krovenia-rp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19572

[services.development]
run = "pnpm --filter @workspace/krovenia-rp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/krovenia-rp", "run", "build" ]
publicDir = "artifacts/krovenia-rp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19572"
BASE_PATH = "/"
